# Cloudflare Workers deployment config
# Migrated from Pages to Workers (2026-04)
# Ref: https://developers.cloudflare.com/workers/framework-guides/web-apps/astro/
#
# NOTE: "main" is intentionally omitted — the Astro build auto-generates
# dist/server/wrangler.json with the correct entry point. Wrangler uses
# that redirected config at deploy time.

name = "bokushi"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"

# KV Namespace Bindings
# 在 Cloudflare Dashboard 创建 KV namespace 后填入 id
# Workers & Pages > KV > Create namespace > 名称: LIKES
[[kv_namespaces]]
binding = "LIKES"
id = "6fd6bc2e5dcb4f0cb7e648ed115debb5"

# Sessions KV Namespace
# Create via: Workers & Pages > KV > Create namespace > Name: bokushi-sessions
[[kv_namespaces]]
binding = "SESSIONS"
id = "a2e1f143c0664e6d860930df0927e033"

# D1 Database Bindings
# Create via: wrangler d1 create bokushi-comments
[[d1_databases]]
binding = "COMMENTS_DB"
database_name = "bokushi-comments"
database_id = "f95ebf0a-500e-4096-86fb-9e7edfde7679"

# Email notifications use Fastmail JMAP API (no Cloudflare Email Routing needed).
# Set these secrets in Cloudflare Workers environment variables:
#   FASTMAIL_API_TOKEN  - Fastmail app password with mail + submission scope
#   NOTIFY_FROM_EMAIL   - (optional) sender address, must be a configured Fastmail identity
