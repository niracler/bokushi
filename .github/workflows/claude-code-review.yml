name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1.0.88 # pin until #1187 symlink fix is released
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          review_comment: true
          prompt: |
            Review this pull request. Use the repository's CLAUDE.md for guidance on style and conventions.

            Focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance and security concerns

